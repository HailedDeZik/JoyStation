<!DOCTYPE html>
<html>
<head>
  <title>Вход</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<header>
  <h1>JoyStation</h1>
  <nav class="nav-links">
    <a href="index.html">Главная</a>
    <a href="catalog.html">Каталог</a>
    <a href="cart.html">Корзина</a>
  </nav>
  <div class="header-actions" id="userInfo">
    <span id="userName"></span>
    <a href="admin.html" id="adminLink" style="display:none;">Админка</a>
    <a href="#" id="logoutBtn" onclick="handleLogout(event)" style="display:none;">Выход</a>
    <a href="login.html" id="loginBtn" style="display:none;">Вход</a>
  </div>
</header>

<div class="auth-container">
  <div class="auth-form">
    <h2>Вход</h2>
    
    <input type="email" id="loginEmail" placeholder="Email" required>
    <input type="password" id="loginPassword" placeholder="Пароль" required>
    
    <button onclick="handleLogin()">Войти</button>
    
    <p>Нет аккаунта? <a href="register.html">Зарегистрируйтесь</a></p>
  </div>
</div>

<script src="../js/script.js"></script>
<script>
  function handleLogin() {
    const email = document.getElementById("loginEmail").value;
    const password = document.getElementById("loginPassword").value;

    if (!email || !password) {
      alert("Заполните все поля!");
      return;
    }

    fetch('http://localhost:3000/api/auth/login', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ email, password })
    })
    .then(response => response.json())
    .then(data => {
      if (data.token) {
        setToken(data.token);
        localStorage.setItem("currentUser", JSON.stringify(data.user));
        alert("Вы успешно вошли!");
        window.location.href = data.user.isAdmin ? "admin.html" : "index.html";
      } else {
        alert(data.message || "Ошибка входа");
      }
    })
    .catch(error => {
      console.error('Ошибка:', error);
      alert("Ошибка подключения к серверу");
    });
  }

  // Если уже авторизован, перенаправить на главную
  if (getToken()) {
    window.location.href = "index.html";
  }
</script>

</body>
</html>
